syntax = "proto3";

package teacher;

option go_package = "github.com/noxturnedev/lms-monorepo/teacher-service/proto/teacher";

service TeacherService {
  rpc CreateCourse (CreateCourseRequest) returns (CourseResponse);
  rpc AssignGrade (AssignGradeRequest) returns (GradeResponse);
}

message CreateCourseRequest {
  string teacher_id = 1;
  string title = 2;
  string description = 3;
}

message CourseResponse {
  string id = 1;
  string title = 2;
}

message AssignGradeRequest {
  string teacher_id = 1; // Security check
  string course_id = 2;
  string student_id = 3; // The UUID from Student Service
  int32 score = 4;
}

message GradeResponse {
  string id = 1;
  bool success = 2;
}
