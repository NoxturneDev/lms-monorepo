syntax = "proto3";

package teacher;

option go_package = "github.com/noxturnedev/lms-monorepo/proto/teacher";

service TeacherService {
  // Authentication
  rpc LoginTeacher (LoginTeacherRequest) returns (LoginTeacherResponse);

  // Teacher CRUD
  rpc CreateTeacher (CreateTeacherRequest) returns (TeacherResponse);
  rpc GetTeacher (GetTeacherRequest) returns (TeacherResponse);
  rpc UpdateTeacher (UpdateTeacherRequest) returns (TeacherResponse);
  rpc DeleteTeacher (DeleteTeacherRequest) returns (DeleteTeacherResponse);
  rpc ListTeachers (ListTeachersRequest) returns (ListTeachersResponse);

  // Assignment Management
  rpc CreateAssignment (CreateAssignmentRequest) returns (AssignmentResponse);
  rpc GetAssignment (GetAssignmentRequest) returns (AssignmentDetailResponse);
  rpc UpdateAssignment (UpdateAssignmentRequest) returns (AssignmentResponse);
  rpc DeleteAssignment (DeleteAssignmentRequest) returns (DeleteAssignmentResponse);
  rpc ListAssignments (ListAssignmentsRequest) returns (ListAssignmentsResponse);
  
  rpc GetTeacherCourseList(TeacherCourseListRequest) returns (TeacherCourseListResponse);

  // Grading
  rpc AssignGrade (AssignGradeRequest) returns (GradeResponse);
  rpc GetStudentGrades (GetStudentGradesRequest) returns (StudentGradesResponse);
  rpc GetCourseGrades (GetCourseGradesRequest) returns (CourseGradesResponse);
  rpc GetStudentCourseGrade (GetStudentCourseGradeRequest) returns (StudentCourseGradeResponse);

  // Reporting
  rpc GetTeacherDashboard (GetTeacherDashboardRequest) returns (TeacherDashboardResponse);

  // Validation (used by School Service)
  rpc ValidateCourseHasAssignments (ValidateCourseAssignmentsRequest) returns (ValidateCourseAssignmentsResponse);
}

message CourseResponse {
  string course_id = 1;
  string teacher_id = 2;
  string title = 3;
}

message TeacherCourseListRequest {
  string teacher_id = 1;
}

message TeacherCourseListResponse {
  repeated CourseResponse courses = 1;
}

message AssignGradeRequest {
  string teacher_id = 1; // Security check
  string assignment_id = 2;
  string student_id = 3; // The UUID from Student Service
  int32 score = 4;
}

message GradeResponse {
  string id = 1;
  bool success = 2;
}

message GetStudentGradesRequest {
  string student_id = 1;
}

message GradeItem {
  string course_title = 1;
  int32 score = 2;
  string assignment_title = 3;
  int32 max_score = 4;
  string assignment_id = 5;
}

message StudentGradesResponse {
  repeated GradeItem grades = 1; // array in proto
}

// Authentication Messages
message LoginTeacherRequest {
  string email = 1;
  string password = 2;
}

message LoginTeacherResponse {
  bool success = 1;
  string message = 2;
  string teacher_id = 3;
  string email = 4;
  string full_name = 5;
}

// Teacher CRUD Messages
message CreateTeacherRequest {
  string email = 1;
  string password = 2;
  string full_name = 3;
}

message GetTeacherRequest {
  string id = 1;
}

message UpdateTeacherRequest {
  string id = 1;
  string email = 2;
  string full_name = 3;
  string password = 4; // optional
}

message DeleteTeacherRequest {
  string id = 1;
}

message DeleteTeacherResponse {
  bool success = 1;
}

message ListTeachersRequest {
  // empty for now, can add pagination later
}

message TeacherResponse {
  string id = 1;
  string email = 2;
  string full_name = 3;
}

message ListTeachersResponse {
  repeated TeacherResponse teachers = 1;
}

// Assignment Messages
message CreateAssignmentRequest {
  string course_id = 1;
  string title = 2;
  string description = 3;
  string category = 4;  // "Lab", "Exam", "Quiz", "Project", etc.
  int32 max_score = 5;
}

message AssignmentResponse {
  string id = 1;
  string title = 2;
  string category = 3;
  int32 max_score = 4;
}

message GetAssignmentRequest {
  string id = 1;
}

message AssignmentDetailResponse {
  string id = 1;
  string course_id = 2;
  string course_title = 3;
  string title = 4;
  string description = 5;
  string category = 6;
  int32 max_score = 7;
}

message UpdateAssignmentRequest {
  string id = 1;
  string title = 2;
  string description = 3;
  string category = 4;
  int32 max_score = 5;
}

message DeleteAssignmentRequest {
  string id = 1;
}

message DeleteAssignmentResponse {
  bool success = 1;
  string message = 2;
}

message ListAssignmentsRequest {
  string course_id = 1;
}

message ListAssignmentsResponse {
  repeated AssignmentDetailResponse assignments = 1;
}

// Student Course Grade Messages
message GetStudentCourseGradeRequest {
  string course_id = 1;
  string student_id = 2;
}

message AssignmentGradeItem {
  string assignment_id = 1;
  string assignment_title = 2;
  int32 score = 3;
  int32 max_score = 4;
}

message StudentCourseGradeResponse {
  string course_id = 1;
  string course_title = 2;
  string student_id = 3;
  double overall_score = 4;
  int32 total_score = 5;
  int32 total_max_score = 6;
  repeated AssignmentGradeItem assignments = 7;
}

// Gradebook Messages
message GetCourseGradesRequest {
  string course_id = 1;
}

message StudentGradeItem {
  string student_id = 1;
  string student_name = 2;
  string student_number = 3;
  int32 score = 4;
  string grade_id = 5;
  string assignment_title = 6;
  int32 max_score = 7;
  string assignment_id = 8;
}

message CourseGradesResponse {
  string course_id = 1;
  string course_title = 2;
  repeated StudentGradeItem grades = 3;
}

// Dashboard Messages
message GetTeacherDashboardRequest {
  string teacher_id = 1;
}

message TeacherDashboardResponse {
  string teacher_id = 1;
  string teacher_name = 2;
  int32 total_courses = 3;
  int32 total_students_enrolled = 4;
  repeated CourseSummary courses = 5;
}

message CourseSummary {
  string course_id = 1;
  string title = 2;
  int32 enrolled_count = 3;
}

// Validation Messages (for School Service)
message ValidateCourseAssignmentsRequest {
  string course_id = 1;
}

message ValidateCourseAssignmentsResponse {
  bool has_assignments = 1;
  int32 assignment_count = 2;
}
