syntax = "proto3";

package student;

// This tells the compiler: "Generate Go code in this folder"
option go_package = "github.com/noxturnedev/lms-monorepo/student-service/proto/student";

// The Interface
service StudentService {
  // Used by Frontend to register
  rpc CreateStudent (CreateStudentRequest) returns (StudentResponse);
  
  // Used by Teacher Service to get names
  rpc GetStudent (GetStudentRequest) returns (StudentResponse);
  rpc DeleteStudent (DeleteStudentRequest) returns (DeleteStudentResponse);
}

// The "Structs" (Messages)

message CreateStudentRequest {
  string email = 1;
  string full_name = 2;
  string password = 3;
  string student_number = 4; // e.g. "STD-001"
}

message GetStudentRequest {
  string id = 1; // UUID string
}

message StudentResponse {
  string id = 1;
  string full_name = 2;
  string email = 3;
  string student_number = 4;
}

message DeleteStudentRequest {
  string id = 1;
}

message DeleteStudentResponse {
  bool success = 1;
}
