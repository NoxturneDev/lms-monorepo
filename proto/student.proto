syntax = "proto3";

package student;

// This tells the compiler: "Generate Go code in this folder"
option go_package = "github.com/noxturnedev/lms-monorepo/student-service/proto/student";

// The Interface
service StudentService {
  // Student CRUD
  rpc CreateStudent (CreateStudentRequest) returns (StudentResponse);
  rpc GetAllStudents (ListStudentRequest) returns (ListStudentResponse);
  rpc GetStudentById (GetStudentByIdRequest) returns (StudentResponse);
  rpc UpdateStudent (UpdateStudentRequest) returns (StudentResponse);
  rpc DeleteStudent (DeleteStudentRequest) returns (DeleteStudentResponse);

  // Student Courses
  rpc GetStudentCourses (GetStudentCoursesRequest) returns (GetStudentCoursesResponse);
}

// The "Structs" (Messages)

message CreateStudentRequest {
  string email = 1;
  string full_name = 2;
  string password = 3;
  string student_number = 4; // e.g. "STD-001"
}

message GetStudentByIdRequest {
  string id = 1; // UUID string
}

message ListStudentRequest {
  string class_id = 1;
}

message StudentResponse {
  string id = 1;
  string full_name = 2;
  string email = 3;
  string student_number = 4;
}

message ListStudentResponse {
  repeated StudentResponse students = 1;
}

message DeleteStudentRequest {
  string id = 1;
}

message DeleteStudentResponse {
  bool success = 1;
}

message UpdateStudentRequest {
  string id = 1;
  string email = 2;
  string full_name = 3;
  string student_number = 4;
  string password = 5; // optional
}

message GetStudentCoursesRequest {
  string student_id = 1;
}

message CourseItem {
  string course_id = 1;
  string title = 2;
  string description = 3;
  string teacher_name = 4;
}

message GetStudentCoursesResponse {
  repeated CourseItem courses = 1;
}
