version: "3.8"

services:
  # ----------------------------------------------------------------
  # APPLICATION SERVICES
  # ----------------------------------------------------------------

  teacher-service:
    build:
      context: ./
      dockerfile: teacher-service/Dockerfile
      target: development
    volumes:
      - ./teacher-service:/app/teacher-service
      - ./proto:/app/proto
    container_name: teacher_app
    restart: on-failure
    ports:
      - "8081:8080" # Host Port 8081 -> Container Port 8080
    environment:
      # THE MAGIC: Connects to 'postgres-teacher' service on internal port 5432
      DATABASE_URL: "postgres://teacher_admin:teacher_password@postgres-teacher:5432/teacher_db?sslmode=disable"
      STUDENT_SERVICE_URL: "student-service:8080"
      PORT: "8080"
    depends_on:
      - postgres-teacher
      - rabbitmq
    networks:
      - lms-net

  student-service:
    build:
      context: ./
      dockerfile: student-service/Dockerfile
      target: development
    volumes:
      - ./student-service:/app/student-service
      - ./proto:/app/proto
    container_name: student_app
    restart: on-failure
    ports:
      - "8082:8080" # Host Port 8082 -> Container Port 8080
    environment:
      # THE MAGIC: Connects to 'postgres-student' service
      DATABASE_URL: "postgres://student_admin:student_password@postgres-student:5432/student_db?sslmode=disable"
      PORT: "8080"
    depends_on:
      - postgres-student
      - rabbitmq
    networks:
      - lms-net

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
      target: development
    ports:
      - "3000:3000" # Open to your host machine
    environment:
      STUDENT_SERVICE_URL: "student-service:8080"
      TEACHER_SERVICE_URL: "teacher-service:8080"
    depends_on:
      - student-service
      - teacher-service
    volumes:
      - ./gateway:/app/gateway
      - ./proto:/app/proto
    networks:
      - lms-net
  # ----------------------------------------------------------------
  # INFRASTRUCTURE: DATABASES
  # ----------------------------------------------------------------

  postgres-teacher:
    image: postgres:15-alpine
    container_name: postgres_teacher
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: teacher_admin
      POSTGRES_PASSWORD: teacher_password
      POSTGRES_DB: teacher_db
    volumes:
      - ./infra/postgres/teacher-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - lms-net

  postgres-student:
    image: postgres:15-alpine
    container_name: postgres_student
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: student_admin
      POSTGRES_PASSWORD: student_password
      POSTGRES_DB: student_db
    volumes:
      - ./infra/postgres/student-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - lms-net

  # ----------------------------------------------------------------
  # INFRASTRUCTURE: MESSAGE BROKER
  # ----------------------------------------------------------------

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq_broker
    ports:
      - "5672:5672" # Protocol Port (Go apps connect here)
      - "15672:15672" # Management UI (Browser: http://localhost:15672)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - lms-net

networks:
  lms-net:
    driver: bridge
